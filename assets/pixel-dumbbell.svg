<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="12" fill="#161B22"/>
  <!-- Border -->
  <rect x="1" y="1" width="478" height="118" rx="11" fill="none" stroke="#10B981" stroke-width="1" opacity="0.25"/>

  <!-- Pixel corner decorations -->
  <rect x="12" y="12" width="4" height="4" fill="#10B981" opacity="0.6"/>
  <rect x="20" y="12" width="4" height="4" fill="#10B981" opacity="0.3"/>
  <rect x="12" y="20" width="4" height="4" fill="#10B981" opacity="0.3"/>

  <rect x="464" y="12" width="4" height="4" fill="#10B981" opacity="0.6"/>
  <rect x="456" y="12" width="4" height="4" fill="#10B981" opacity="0.3"/>
  <rect x="464" y="20" width="4" height="4" fill="#10B981" opacity="0.3"/>

  <rect x="12" y="104" width="4" height="4" fill="#10B981" opacity="0.6"/>
  <rect x="20" y="104" width="4" height="4" fill="#10B981" opacity="0.3"/>
  <rect x="12" y="96"  width="4" height="4" fill="#10B981" opacity="0.3"/>

  <rect x="464" y="104" width="4" height="4" fill="#10B981" opacity="0.6"/>
  <rect x="456" y="104" width="4" height="4" fill="#10B981" opacity="0.3"/>
  <rect x="464" y="96"  width="4" height="4" fill="#10B981" opacity="0.3"/>

  <!-- Dumbbell (pixel = 8px, centered at 240,60) -->
  <!-- left outer x=92..116  y=40..80  -->
  <!-- left inner x=116..140 y=28..92  -->
  <!-- bar        x=140..340 y=52..68  -->
  <!-- right inner x=340..364 y=28..92 -->
  <!-- right outer x=364..388 y=40..80 -->

  <g filter="url(#glow)">

    <!-- Left outer plate -->
    <rect x="92"  y="40" width="24" height="40" fill="#10B981"/>
    <rect x="92"  y="40" width="24" height="8"  fill="#34D399"/>
    <rect x="92"  y="72" width="24" height="8"  fill="#059669"/>

    <!-- Left inner plate -->
    <rect x="116" y="28" width="24" height="64" fill="#10B981"/>
    <rect x="116" y="28" width="24" height="8"  fill="#34D399"/>
    <rect x="116" y="84" width="24" height="8"  fill="#059669"/>

    <!-- Bar -->
    <rect x="140" y="52" width="200" height="16" fill="#10B981"/>
    <rect x="140" y="52" width="200" height="8"  fill="#34D399"/>
    <rect x="140" y="60" width="200" height="8"  fill="#059669"/>

    <!-- Right inner plate -->
    <rect x="340" y="28" width="24" height="64" fill="#10B981"/>
    <rect x="340" y="28" width="24" height="8"  fill="#34D399"/>
    <rect x="340" y="84" width="24" height="8"  fill="#059669"/>

    <!-- Right outer plate -->
    <rect x="364" y="40" width="24" height="40" fill="#10B981"/>
    <rect x="364" y="40" width="24" height="8"  fill="#34D399"/>
    <rect x="364" y="72" width="24" height="8"  fill="#059669"/>

  </g>
</svg>
